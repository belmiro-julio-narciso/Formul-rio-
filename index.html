<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Dados</title>
  <style type="text/css">
    *
    {
      margin:0px;
      padding:0px;
    }
    body
    {
      background:#000;
    }
    h1
    {
      color:#CDCDCD;
      background-position:fixed;
      margin-top:10px;
      margin-bottom:20px;
      margin-left:100px;
    }
    #formulario
    {
      background:#FFFFFF;
      border-radius:10px;
      color: black;
      margin-left:60px;
      width:260px;
      height:380px;
      box-shadow:6px 6px 6px #20FF31, -6px -6px 6px #5147FF;
    }
    #formulario>h3,h5
    {
      padding-top:10px;
      text-align:center;
    }
    #formulario>p
    {
      margin:10px;
    }
    #formulario>input
    {
      margin-left:20px;
      width:200px;
      border-radius:20px;
    }
      button
    {
      transition:box-shadow 0.0s ease;
      width:90px;
      height:50px;
      color:#FFFFFF;
      background:#000;
      border-radius:20px;
      margin-top:20px;
      margin-left:80px;
    }
    button:hover
    {
      color: #000;
      background:#FFF;
      box-shadow:6px 6px 9px #20FF31,-5px -5px 9px #2300FF;
    }
   
  </style>
</head>
<body>
  <h1>Formulário</h1>
  <div id="formulario">
    <h3>Dados Pessoais</h3>
    <p>Nome :</p>
    <input type="text"name=""id="nome">
    <p>Data de Nascimento :</p>
    <input type="date" name="" id="">
    <p>E-mail :</p>
    <input type="email" name="" id="">
    <p>N° do celular :</p>
    <input type="tel" name="" id="" value="" />
    <button type="submit">Enviar</button>
  </div>
</body>

</html>
